name: Release

# Triggered by pushing a version tag, e.g.:
#   npm version patch   # bumps package.json + creates the git tag
#   git push --follow-tags
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build userscript
        run: bun run build

      - name: Verify build output
        run: |
          test -f dist/ig-video-control.user.js
          test -f dist/ig-video-control.meta.js

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ig-video-control.user.js
            dist/ig-video-control.meta.js
